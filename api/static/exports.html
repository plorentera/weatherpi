<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Lista de exports generados por Meteo Station" />
  <title>Exports - Meteo Station</title>
  <link href="/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="bg-body-tertiary">
  <nav class="navbar navbar-expand-lg bg-body border-bottom sticky-top">
    <div class="container py-2">
      <a class="navbar-brand fw-semibold" href="/">Meteo Station</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Alternar navegación">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <div class="navbar-nav ms-auto gap-lg-2">
          <a class="nav-link" href="/">Dashboard</a>
          <a class="nav-link" href="/settings.html">Configuración</a>
          <a class="nav-link" href="/outbox.html">Outbox</a>
          <a class="nav-link active" href="/exports.html">Exports</a>
          <a class="nav-link" href="/api.html">API</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="container py-4 py-lg-5">
    <section class="card shadow-sm mb-4">
      <div class="card-body p-4 p-lg-5">
        <div class="row align-items-end g-4">
          <div class="col-lg-8">
            <div class="text-uppercase text-secondary small fw-semibold mb-2">Histórico de archivos</div>
            <h1 class="display-6 fw-semibold mb-3">Exports y backups listos para descargar</h1>
            <p class="lead text-secondary mb-0">Consulta los ficheros CSV generados por la estación y accede a su periodo de cobertura en un clic.</p>
          </div>
          <div class="col-lg-4 text-lg-end">
            <a class="btn btn-outline-secondary" href="/api/export.csv?days=7">Descargar CSV reciente</a>
          </div>
        </div>
      </div>
    </section>

    <section class="card shadow-sm p-4">
      <div class="d-flex justify-content-between align-items-center gap-3 mb-3">
        <div>
          <div class="small text-uppercase text-secondary fw-semibold mb-1">Últimos backups</div>
          <div class="small text-secondary" id="msg">cargando…</div>
        </div>
      </div>
      <div id="list" class="row g-3"></div>
    </section>
  </main>

  <script src="/vendor/bootstrap/bootstrap.bundle.min.js"></script>
  <script>
    function fmtTs(ts) {
      const d = new Date(ts * 1000);
      return d.toLocaleString();
    }

    async function load() {
      const res = await fetch("/api/exports?limit=50", { cache: "no-store" });
      const data = await res.json();
      const list = document.getElementById("list");
      list.innerHTML = "";
      document.getElementById("msg").textContent = `exports: ${data.items.length}`;

      for (const e of data.items) {
        const div = document.createElement("div");
        div.className = "col-12 col-lg-6";
        div.innerHTML = `
          <div class="card h-100 shadow-sm">
            <div class="card-body p-4">
              <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
                <div>
                  <div class="small text-uppercase text-secondary fw-semibold mb-1">Archivo</div>
                  <div class="fw-semibold text-break">${e.filename}</div>
                </div>
                <a class="btn btn-sm btn-primary" href="/api/exports/${e.id}">Descargar</a>
              </div>
              <div class="small text-secondary mb-2">Creado: ${fmtTs(e.created_ts)}</div>
              <div class="small text-secondary mb-0">Periodo: ${fmtTs(e.period_from_ts)} → ${fmtTs(e.period_to_ts)}</div>
            </div>
          </div>
        `;
        list.appendChild(div);
      }
    }

    load();
    setInterval(load, 10000);
  </script>
</body>
</html>
